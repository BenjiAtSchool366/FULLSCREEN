<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Simpsons Wrestling (PSX)</title>
    <style>
        /* Forces the entire browser tab to act as a seamless canvas */
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }
        /* Forces the emulator to fill 100% of the display window */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Direct Un-shortened Game Server Link -->
    <iframe src="archive.org" 
            allow="autoplay; fullscreen; gamepad; keyboard;" 
            webkitallowfullscreen="true" 
            mozallowfullscreen="true" 
            allowfullscreen="true">
    </iframe>

</body>
</html>
